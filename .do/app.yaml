spec:
  name: musa-portofolio
  services:
    - name: musa-portofolio
      github:
        repo: musahabibulloh17/New-Porto
        branch: main
        deploy_on_push: true
      source_dir: /
      environment_slug: node-js
      build_command: npm install --include=dev && npm run build && cd server && npm install --production
      run_command: node server/server.js
      http_port: 8080
      instance_count: 1
      instance_size_slug: apps-s-1vcpu-0.5gb
      health_check:
        http_path: /health
